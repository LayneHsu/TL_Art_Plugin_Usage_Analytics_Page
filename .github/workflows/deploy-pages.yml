name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "config/environments/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PORTAL_DEPLOY_ENV: production
      PORTAL_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}/
      PORTAL_FIREBASE_API_KEY: ${{ vars.PORTAL_FIREBASE_API_KEY }}
      PORTAL_FIREBASE_AUTH_DOMAIN: ${{ vars.PORTAL_FIREBASE_AUTH_DOMAIN }}
      PORTAL_FIREBASE_PROJECT_ID: ${{ vars.PORTAL_FIREBASE_PROJECT_ID }}
      PORTAL_FIREBASE_APP_ID: ${{ vars.PORTAL_FIREBASE_APP_ID }}
      PORTAL_FIREBASE_STORAGE_BUCKET: ${{ vars.PORTAL_FIREBASE_STORAGE_BUCKET }}
      PORTAL_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.PORTAL_FIREBASE_MESSAGING_SENDER_ID }}
      PORTAL_FUNCTIONS_BASE_URL: ${{ vars.PORTAL_FUNCTIONS_BASE_URL }}
      PORTAL_PAGES_ORIGIN: ${{ vars.PORTAL_PAGES_ORIGIN }}
      PORTAL_FIREBASE_AUTHORIZED_DOMAINS_JSON: ${{ vars.PORTAL_FIREBASE_AUTHORIZED_DOMAINS_JSON }}
      PORTAL_ALLOWED_WEB_ORIGINS_JSON: ${{ vars.PORTAL_ALLOWED_WEB_ORIGINS_JSON }}
    steps:
      - name: Require main ref
        if: github.ref != 'refs/heads/main'
        shell: bash
        run: |
          echo "Deployment is allowed only from refs/heads/main." >&2
          exit 1
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: npm ci
      - name: Verify production web configuration and Firebase authorized domains
        run: npm run validate:pages-production
      - name: Build portal
        run: npm run build:web
      - name: Verify Pages artifacts
        run: npm run test:pages-artifacts
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web/dist
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Smoke test deployed Pages and Functions CORS
        env:
          PORTAL_SMOKE_BASE_URL: ${{ steps.deployment.outputs.page_url }}
          PORTAL_SMOKE_FUNCTIONS_BASE_URL: ${{ vars.PORTAL_FUNCTIONS_BASE_URL }}
        run: npm run test:pages-smoke
