name: Deploy Firebase

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-production
  cancel-in-progress: false

jobs:
  deploy:
    environment: firebase-production
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PORTAL_FIREBASE_PROJECT_ID: ${{ vars.PORTAL_FIREBASE_PROJECT_ID }}
      TL_USAGE_ANALYTICS_FIREBASE_PROJECT_ID: ${{ vars.TL_USAGE_ANALYTICS_FIREBASE_PROJECT_ID }}
      PORTAL_COMPANY_DOMAINS_JSON: ${{ vars.PORTAL_COMPANY_DOMAINS_JSON }}
      PORTAL_ALLOWED_WEB_ORIGINS_JSON: ${{ vars.PORTAL_ALLOWED_WEB_ORIGINS_JSON }}
      PORTAL_PAGES_ORIGIN: ${{ vars.PORTAL_PAGES_ORIGIN }}
      PLUGIN_OAUTH_CLIENT_ID: ${{ vars.PLUGIN_OAUTH_CLIENT_ID }}
      PLUGIN_COMPANY_DOMAIN: ${{ vars.PLUGIN_COMPANY_DOMAIN }}
      PLUGIN_ALLOWED_CALLBACK_URIS_JSON: ${{ vars.PLUGIN_ALLOWED_CALLBACK_URIS_JSON }}
      PLUGIN_ALLOWED_WEB_ORIGINS_JSON: ${{ vars.PLUGIN_ALLOWED_WEB_ORIGINS_JSON }}
      PLUGIN_OPS_AUDIENCE: ${{ vars.PLUGIN_OPS_AUDIENCE }}
      PLUGIN_OPS_ALLOWED_SERVICE_ACCOUNTS_JSON: ${{ vars.PLUGIN_OPS_ALLOWED_SERVICE_ACCOUNTS_JSON }}
      PLUGIN_PRINCIPAL_KEY_ID: ${{ vars.PLUGIN_PRINCIPAL_KEY_ID }}
      PLUGIN_PRINCIPAL_PEPPER_MIGRATION_MODE: ${{ vars.PLUGIN_PRINCIPAL_PEPPER_MIGRATION_MODE }}
      USAGE_RETENTION_SCHEDULE: ${{ vars.USAGE_RETENTION_SCHEDULE }}
      USAGE_RETENTION_TIME_ZONE: ${{ vars.USAGE_RETENTION_TIME_ZONE }}
      USAGE_RETENTION_POLICY_JSON: ${{ vars.USAGE_RETENTION_POLICY_JSON }}
      USAGE_RETENTION_RUN_ID_PREFIX: ${{ vars.USAGE_RETENTION_RUN_ID_PREFIX }}
      USAGE_RETENTION_DRY_RUN: ${{ vars.USAGE_RETENTION_DRY_RUN }}
      USAGE_RETENTION_MAX_PAGES: ${{ vars.USAGE_RETENTION_MAX_PAGES }}
      USAGE_RETENTION_OWNER_ID: ${{ vars.USAGE_RETENTION_OWNER_ID }}
      USAGE_RETENTION_LEASE_MS: ${{ vars.USAGE_RETENTION_LEASE_MS }}
      USAGE_MONITORING_SCHEDULE: ${{ vars.USAGE_MONITORING_SCHEDULE }}
      USAGE_MONITORING_TIME_ZONE: ${{ vars.USAGE_MONITORING_TIME_ZONE }}
      USAGE_MONITORING_CONFIG_JSON: ${{ vars.USAGE_MONITORING_CONFIG_JSON }}
    steps:
      - name: Require main ref
        if: github.ref != 'refs/heads/main'
        shell: bash
        run: |
          echo "Deployment is allowed only from refs/heads/main." >&2
          exit 1
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify repository
        run: npm run verify
      - name: Verify production emulators
        run: npm run verify:production
      - name: Require active production registry
        run: npm run validate:production-registry
      - name: Validate Firebase runtime configuration
        run: npm run validate:firebase-runtime
        env:
          PLUGIN_OAUTH_CLIENT_SECRET: ${{ secrets.PLUGIN_OAUTH_CLIENT_SECRET }}
          PLUGIN_CREDENTIAL_PEPPER: ${{ secrets.PLUGIN_CREDENTIAL_PEPPER }}
          PLUGIN_CREDENTIAL_DELIVERY_KEYS_JSON: ${{ secrets.PLUGIN_CREDENTIAL_DELIVERY_KEYS_JSON }}
          PLUGIN_PRINCIPAL_KEY_PEPPER: ${{ secrets.PLUGIN_PRINCIPAL_KEY_PEPPER }}
          PLUGIN_LEASE_SIGNING_KEYS_JSON: ${{ secrets.PLUGIN_LEASE_SIGNING_KEYS_JSON }}
          PORTAL_POLICY_HMAC_KEYS_JSON: ${{ secrets.PORTAL_POLICY_HMAC_KEYS_JSON }}
          PORTAL_BOOTSTRAP_ADMIN_JSON: ${{ secrets.PORTAL_BOOTSTRAP_ADMIN_JSON }}
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.PORTAL_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.PORTAL_GCP_DEPLOY_SERVICE_ACCOUNT }}
      - name: Configure Firebase function secrets
        run: node scripts/sync-firebase-secrets.mjs
        env:
          PLUGIN_OAUTH_CLIENT_SECRET: ${{ secrets.PLUGIN_OAUTH_CLIENT_SECRET }}
          PLUGIN_CREDENTIAL_PEPPER: ${{ secrets.PLUGIN_CREDENTIAL_PEPPER }}
          PLUGIN_CREDENTIAL_DELIVERY_KEYS_JSON: ${{ secrets.PLUGIN_CREDENTIAL_DELIVERY_KEYS_JSON }}
          PLUGIN_PRINCIPAL_KEY_PEPPER: ${{ secrets.PLUGIN_PRINCIPAL_KEY_PEPPER }}
          PLUGIN_LEASE_SIGNING_KEYS_JSON: ${{ secrets.PLUGIN_LEASE_SIGNING_KEYS_JSON }}
          PORTAL_POLICY_HMAC_KEYS_JSON: ${{ secrets.PORTAL_POLICY_HMAC_KEYS_JSON }}
          PORTAL_BOOTSTRAP_ADMIN_JSON: ${{ secrets.PORTAL_BOOTSTRAP_ADMIN_JSON }}
      - name: Deploy functions and Firestore configuration
        run: >-
          npm run firebase -- deploy
          --project "$PORTAL_FIREBASE_PROJECT_ID"
          --only functions,firestore:rules,firestore:indexes
          --non-interactive
